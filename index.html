<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Indodax Triangle Arbitrage Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 24px auto;
      padding: 16px;
      background: #111;
      color: #eee;
    }
    h1 { margin-bottom: 8px; }
    .box {
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }
    label { display: block; margin: 10px 0 4px; }
    input, button, select {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #222;
      color: #fff;
      box-sizing: border-box;
    }
    button {
      cursor: pointer;
      background: #2f6fed;
      border: none;
      margin-top: 14px;
    }
    button:hover { opacity: 0.9; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .result {
      font-size: 15px;
      line-height: 1.8;
      white-space: pre-line;
    }
    .profit { color: #59d185; font-weight: bold; }
    .loss { color: #ff6b6b; font-weight: bold; }
    .small { font-size: 12px; color: #aaa; }
  </style>
</head>
<body>
  <h1>Triangle Arbitrage Calculator - Indodax</h1>
  <p class="small">
    Jalur default: IDR → USDT → XRP → IDR
  </p>

  <div class="box">
    <div class="grid">
      <div>
        <label>Modal awal (IDR)</label>
        <input id="startIdr" type="number" value="1000000" />
      </div>
      <div>
        <label>Fee per transaksi (%)</label>
        <input id="feePct" type="number" step="0.0001" value="0.3" />
      </div>
      <div>
        <label>Pair 1 (buy USDT dengan IDR)</label>
        <input id="pair1" type="text" value="usdt_idr" />
      </div>
      <div>
        <label>Pair 2 (buy XRP dengan USDT)</label>
        <input id="pair2" type="text" value="xrp_usdt" />
      </div>
      <div>
        <label>Pair 3 (sell XRP ke IDR)</label>
        <input id="pair3" type="text" value="xrp_idr" />
      </div>
      <div>
        <label>Auto refresh (detik)</label>
        <input id="refreshSec" type="number" value="3" min="1" />
      </div>
    </div>

    <button id="calcBtn">Hitung Sekarang</button>
    <button id="toggleAutoBtn">Start Auto Refresh</button>
  </div>

  <div class="box">
    <div id="result" class="result">Belum ada perhitungan.</div>
  </div>

  <script>
    const resultEl = document.getElementById("result");
    const calcBtn = document.getElementById("calcBtn");
    const toggleAutoBtn = document.getElementById("toggleAutoBtn");

    let timer = null;

    async function fetchDepth(pair) {
      const url = `https://indodax.com/api/${pair}/depth`;
      const res = await fetch(url);
      if (!res.ok) {
        throw new Error(`Gagal fetch ${pair}: HTTP ${res.status}`);
      }
      return await res.json();
    }

    function getBestAsk(depth) {
      // sell/asks = order jual orang lain => harga beli termurah untuk kita
      const asks = depth.sell || depth.asks;
      if (!asks || !asks.length) throw new Error("Ask book kosong");
      return parseFloat(asks[0][0]);
    }

    function getBestBid(depth) {
      // buy/bids = order beli orang lain => harga jual tertinggi untuk kita
      const bids = depth.buy || depth.bids;
      if (!bids || !bids.length) throw new Error("Bid book kosong");
      return parseFloat(bids[0][0]);
    }

    function fmt(n, max = 8) {
      return Number(n).toLocaleString("id-ID", {
        maximumFractionDigits: max
      });
    }

    async function calculateTriangle() {
      try {
        const startIdr = parseFloat(document.getElementById("startIdr").value);
        const feePct = parseFloat(document.getElementById("feePct").value);
        const pair1 = document.getElementById("pair1").value.trim().toLowerCase();
        const pair2 = document.getElementById("pair2").value.trim().toLowerCase();
        const pair3 = document.getElementById("pair3").value.trim().toLowerCase();

        const fee = feePct / 100;

        resultEl.textContent = "Mengambil order book...";

        const [depth1, depth2, depth3] = await Promise.all([
          fetchDepth(pair1),
          fetchDepth(pair2),
          fetchDepth(pair3)
        ]);

        const ask1 = getBestAsk(depth1); // usdt_idr
        const ask2 = getBestAsk(depth2); // xrp_usdt
        const bid3 = getBestBid(depth3); // xrp_idr

        // Step 1: IDR -> USDT
        let usdt = startIdr / ask1;
        usdt = usdt * (1 - fee);

        // Step 2: USDT -> XRP
        let xrp = usdt / ask2;
        xrp = xrp * (1 - fee);

        // Step 3: XRP -> IDR
        let finalIdr = xrp * bid3;
        finalIdr = finalIdr * (1 - fee);

        const profitIdr = finalIdr - startIdr;
        const profitPct = (profitIdr / startIdr) * 100;

        const grossEdge = bid3 / (ask1 * ask2);
        const netEdge = finalIdr / startIdr;

        const cls = profitIdr >= 0 ? "profit" : "loss";

        resultEl.innerHTML = `
Timestamp: ${new Date().toLocaleString("id-ID")}

Pair:
1. ${pair1} (ASK) = ${fmt(ask1)}
2. ${pair2} (ASK) = ${fmt(ask2)}
3. ${pair3} (BID) = ${fmt(bid3)}

Modal awal:
IDR ${fmt(startIdr, 2)}

Simulasi:
IDR -> USDT = ${fmt(usdt)}
USDT -> XRP = ${fmt(xrp)}
XRP -> IDR = ${fmt(finalIdr, 2)}

Gross edge:
${fmt(grossEdge, 8)}

Net edge:
${fmt(netEdge, 8)}

<span class="${cls}">Profit/Loss:
IDR ${fmt(profitIdr, 2)} (${fmt(profitPct, 4)}%)</span>
        `;
      } catch (err) {
        resultEl.innerHTML = `<span class="loss">Error: ${err.message}</span>`;
      }
    }

    calcBtn.addEventListener("click", calculateTriangle);

    toggleAutoBtn.addEventListener("click", () => {
      if (timer) {
        clearInterval(timer);
        timer = null;
        toggleAutoBtn.textContent = "Start Auto Refresh";
        return;
      }

      const refreshSec = Math.max(1, parseInt(document.getElementById("refreshSec").value || "3", 10));
      calculateTriangle();
      timer = setInterval(calculateTriangle, refreshSec * 1000);
      toggleAutoBtn.textContent = "Stop Auto Refresh";
    });
  </script>
</body>
</html>
