<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Indodax Triangle Arbitrage Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 920px;
      margin: 24px auto;
      padding: 16px;
      background: #111;
      color: #eee;
    }

    h1 {
      margin-bottom: 8px;
    }

    .muted {
      color: #aaa;
      font-size: 13px;
    }

    .box {
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin: 10px 0 4px;
      font-size: 14px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #222;
      color: #fff;
      box-sizing: border-box;
    }

    button {
      cursor: pointer;
      background: #2f6fed;
      border: none;
      margin-top: 14px;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.92;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .result {
      font-size: 15px;
      line-height: 1.8;
      white-space: pre-line;
    }

    .profit {
      color: #59d185;
      font-weight: bold;
    }

    .loss {
      color: #ff6b6b;
      font-weight: bold;
    }

    .warn {
      color: #ffd166;
      font-weight: bold;
    }

    .footer-note {
      font-size: 12px;
      color: #9a9a9a;
      margin-top: 8px;
    }

    @media (max-width: 720px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <h1>Triangle Arbitrage Calculator - Indodax</h1>
  <p class="muted">
    Jalur default: IDR → USDT → XRP → IDR
  </p>

  <div class="box">
    <div class="grid">
      <div>
        <label for="startIdr">Modal awal (IDR)</label>
        <input id="startIdr" type="number" value="1000000" />
      </div>

      <div>
        <label for="feePct">Fee per transaksi (%)</label>
        <input id="feePct" type="number" step="0.0001" value="0.3" />
      </div>

      <div>
        <label for="pair1">Pair 1 - beli USDT dengan IDR</label>
        <input id="pair1" type="text" value="usdtidr" />
      </div>

      <div>
        <label for="pair2">Pair 2 - beli BTC dengan USDT</label>
        <input id="pair2" type="text" value="btcusdt" />
      </div>

      <div>
        <label for="pair3">Pair 3 - jual BTC ke IDR</label>
        <input id="pair3" type="text" value="btcidr" />
      </div>

      <div>
        <label for="refreshSec">Auto refresh (detik)</label>
        <input id="refreshSec" type="number" value="3" min="1" />
      </div>

      <div>
        <label for="minProfitAlert">Alert minimum net profit (%)</label>
        <input id="minProfitAlert" type="number" step="0.0001" value="0.2" />
      </div>
    </div>

    <button id="calcBtn">Hitung Sekarang</button>
    <button id="toggleAutoBtn">Start Auto Refresh</button>
    <div class="footer-note">
      Format pair contoh: <b>btcidr</b>, <b>ethidr</b>, <b>xrpusdt</b>, <b>xrpidr</b>
    </div>
  </div>

  <div class="box">
    <div id="result" class="result">Belum ada perhitungan.</div>
  </div>

  <script>
    const resultEl = document.getElementById("result");
    const calcBtn = document.getElementById("calcBtn");
    const toggleAutoBtn = document.getElementById("toggleAutoBtn");

    let timer = null;

    async function fetchTicker(pair) {
      const cleanPair = pair.trim().toLowerCase();
      const url = `https://indodax.com/api/ticker/${cleanPair}`;

      const res = await fetch(url);
      if (!res.ok) {
        throw new Error(`Gagal fetch ${cleanPair}: HTTP ${res.status}`);
      }

      const json = await res.json();

      if (!json || !json.ticker) {
        throw new Error(`Respons ticker ${cleanPair} tidak valid`);
      }

      return json.ticker;
    }

    function fmt(n, max = 8) {
      return Number(n).toLocaleString("id-ID", {
        maximumFractionDigits: max
      });
    }

    function toNum(v) {
      const n = parseFloat(v);
      if (Number.isNaN(n)) {
        throw new Error(`Nilai angka tidak valid: ${v}`);
      }
      return n;
    }

    async function calculateTriangle() {
      try {
        const startIdr = toNum(document.getElementById("startIdr").value);
        const feePct = toNum(document.getElementById("feePct").value);
        const minProfitAlert = toNum(document.getElementById("minProfitAlert").value);

        const pair1 = document.getElementById("pair1").value.trim().toLowerCase();
        const pair2 = document.getElementById("pair2").value.trim().toLowerCase();
        const pair3 = document.getElementById("pair3").value.trim().toLowerCase();

        if (!pair1 || !pair2 || !pair3) {
          throw new Error("Semua pair wajib diisi");
        }

        const fee = feePct / 100;

        resultEl.textContent = "Mengambil data ticker...";

        const [ticker1, ticker2, ticker3] = await Promise.all([
          fetchTicker(pair1),
          fetchTicker(pair2),
          fetchTicker(pair3)
        ]);

        // Buy pakai harga jual terendah (sell)
        const ask1 = toNum(ticker1.sell);
        const ask2 = toNum(ticker2.sell);

        // Sell pakai harga beli tertinggi (buy)
        const bid3 = toNum(ticker3.buy);

        // Step 1: IDR -> USDT
        let usdt = startIdr / ask1;
        usdt = usdt * (1 - fee);

        // Step 2: USDT -> XRP
        let xrp = usdt / ask2;
        xrp = xrp * (1 - fee);

        // Step 3: XRP -> IDR
        let finalIdr = xrp * bid3;
        finalIdr = finalIdr * (1 - fee);

        const profitIdr = finalIdr - startIdr;
        const profitPct = (profitIdr / startIdr) * 100;

        const grossEdge = bid3 / (ask1 * ask2);
        const netEdge = finalIdr / startIdr;

        let statusClass = "loss";
        let statusText = "Rugi / belum layak";

        if (profitPct >= minProfitAlert) {
          statusClass = "profit";
          statusText = "Peluang profit";
        } else if (profitPct >= 0) {
          statusClass = "warn";
          statusText = "Profit tipis";
        }

        resultEl.innerHTML = `
Timestamp: ${new Date().toLocaleString("id-ID")}

Pair:
1. ${pair1} (ASK / sell) = ${fmt(ask1)}
2. ${pair2} (ASK / sell) = ${fmt(ask2)}
3. ${pair3} (BID / buy)  = ${fmt(bid3)}

Modal awal:
IDR ${fmt(startIdr, 2)}

Simulasi:
IDR -> USDT = ${fmt(usdt)}
USDT -> XRP = ${fmt(xrp)}
XRP -> IDR  = ${fmt(finalIdr, 2)}

Gross edge:
${fmt(grossEdge, 8)}

Net edge:
${fmt(netEdge, 8)}

Status:
<span class="${statusClass}">${statusText}</span>

<span class="${statusClass}">Profit/Loss:
IDR ${fmt(profitIdr, 2)} (${fmt(profitPct, 4)}%)</span>
        `;
      } catch (err) {
        resultEl.innerHTML = `<span class="loss">Error: ${err.message}</span>`;
      }
    }

    calcBtn.addEventListener("click", calculateTriangle);

    toggleAutoBtn.addEventListener("click", () => {
      if (timer) {
        clearInterval(timer);
        timer = null;
        toggleAutoBtn.textContent = "Start Auto Refresh";
        return;
      }

      const refreshSec = Math.max(
        1,
        parseInt(document.getElementById("refreshSec").value || "3", 10)
      );

      calculateTriangle();
      timer = setInterval(calculateTriangle, refreshSec * 1000);
      toggleAutoBtn.textContent = "Stop Auto Refresh";
    });
  </script>
</body>
</html>
